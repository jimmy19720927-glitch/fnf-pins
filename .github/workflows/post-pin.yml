name: Post Pin

on:
  schedule:
    - cron: '0 4,8,13 * * *'   # 每天 3 發：UTC 04/08/13 = 台灣 12:00/16:00/21:00，每次發 queue 最前面 1 張
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: post-pin
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post next queued pin via Make.com
        env:
          MAKE_TOKEN: ${{ secrets.MAKE_TOKEN }}
        run: python3 scripts/post_pin.py
      - name: Commit queue state
        run: |
          git config user.name "fnf-pins bot"
          git config user.email "actions@github.com"
          git add queue posted
          git diff --cached --quiet || git commit -m "pin posted $(date -u +%Y-%m-%d)"
          git push
